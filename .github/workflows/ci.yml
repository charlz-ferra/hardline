name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: shellcheck
        run: shellcheck -S style hardline install.sh
      - name: smoke run
        run: |
          chmod +x hardline
          ./hardline --no-color || true   # FAILs are expected on a CI runner
          ./hardline --json | python3 -c 'import json,sys; json.load(sys.stdin)'

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: install bats
        run: git clone --depth 1 https://github.com/bats-core/bats-core /tmp/bats
      - name: bats
        run: /tmp/bats/bin/bats tests/
